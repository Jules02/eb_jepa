logging:
  log_wandb: true
  wandb_group:
  wandb_sweep:
  log_every: 10
  exp_suffix: sigreg
  save_every_n_epochs: 1
  tqdm_silent: false
meta:
  model_folder:
  load_model: true
  # Plan eval disabled: we only need the encoder checkpoints (for the latent-distance
  # viz). The per-epoch MPPI planning eval (~30 min/epoch of GIF rendering) is the main
  # time sink — run it separately on the final checkpoint with --meta.eval_only_mode True.
  enable_plan_eval: false
  eval_every_itr: -1
  light_eval_freq: 50
  seed: 1
data:
  env_name: two_rooms
  batch_size: 384
  num_workers: 16
  pin_mem: true
  persistent_workers: false
  pipeline:
    mode: stream
    backend: gpu
    chunk_size: 3840
    gen_batch_size: null
    dtype: bfloat16
training:
  use_amp: true
  dtype: bfloat16
model:
  compile: true
  dobs: 2
  henc: 32
  hpre: 32
  dstc: 32
  nsteps: 8
  encoder_architecture: impala
  train_rollout: last
  encoder_skip_connections: True
  predictor_skip_connections: True
  regularizer:
    # --- SIGReg (LeJEPA) instead of VICReg ---
    reg_type: sigreg          # vicreg | sigreg
    sigreg_coeff: 10.0        # weight on the sliced Epps-Pulley term (image_jepa uses 10)
    sigreg_num_slices: 256
    # VICReg coeffs are ignored when reg_type=sigreg, kept for reference / easy switch-back
    cov_coeff: 8
    std_coeff: 16
    # shared terms (unchanged)
    sim_coeff_t: 12
    idm_coeff: 1
    first_t_only: False
    spatial_as_samples: false
    use_proj: false
    idm_after_proj: false
    sim_t_after_proj: false
optim:
  epochs: 12
  lr: 0.001
  grad_clip_enc: 2.0
  grad_clip_pred: 2.0
  weight_decay: 1.e-5
eval:
  plan_cfg_path: examples/ac_video_jepa/cfgs/planning/two_rooms/planning_mppi.yaml
  eval_cfg_path: examples/ac_video_jepa/cfgs/eval/two_rooms/eval.yaml

sweep:
  param_grid:
    model.regularizer.sigreg_coeff: [5, 10, 25]
    meta.seed: [1, 1000, 10000]
