# Maze training — VICReg + temporal-distance, with h1/h2 DISENTANGLE split.
# Identical to train_maze_temporal.yaml EXCEPT for the two regularizer fields at the
# bottom (dist_split_frac, cross_cov_coeff). Isolates ONE variable: does routing the
# distance (tdist) into a geometry block h1, keeping IDM in a decorrelated control block
# h2, make ||E(s0)-E(s)|| show a ridge at the maze doors? (viz_distance_landscape).
logging:
  log_wandb: true
  wandb_group:
  wandb_sweep:
  log_every: 10
  exp_suffix: maze_disentangle
  save_every_n_epochs: 1
  tqdm_silent: false
meta:
  model_folder:
  load_model: true
  enable_plan_eval: false
  eval_every_itr: -1
  light_eval_freq: 50
  seed: 1
data:
  env_name: maze
  batch_size: 384
  num_workers: 16
  pin_mem: true
  persistent_workers: true
training:
  use_amp: true
  dtype: bfloat16
model:
  compile: true
  compile_mode: reduce-overhead
  dobs: 2
  henc: 32
  hpre: 32
  dstc: 32
  nsteps: 8
  encoder_architecture: impala
  train_rollout: last
  encoder_skip_connections: True
  predictor_skip_connections: True
  regularizer:
    reg_type: vicreg
    cov_coeff: 8
    std_coeff: 16
    sim_coeff_t: 12
    idm_coeff: 1
    tdist_coeff: 5.0
    first_t_only: False
    spatial_as_samples: false
    use_proj: false
    idm_after_proj: false
    sim_t_after_proj: false
    # --- h1/h2 disentangle split (the ONLY change vs train_maze_temporal) ---
    dist_split_frac: 0.5    # h1 = first 50% of latent channels (geometry/tdist); h2 = rest (IDM)
    cross_cov_coeff: 1.0    # decorrelate h1 from h2
optim:
  epochs: 12
  lr: 0.001
  grad_clip_enc: 2.0
  grad_clip_pred: 2.0
  weight_decay: 1.e-5
eval:
  plan_cfg_path: examples/ac_video_jepa/cfgs/planning/two_rooms/planning_mppi.yaml
  eval_cfg_path: examples/ac_video_jepa/cfgs/eval/maze/eval_maze.yaml
